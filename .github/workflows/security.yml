name: Security Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # 1. Audit des dépendances npm
  # ─────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true  # La version vulnérable a des vulns connues

      - name: Generate audit report
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json

  # ─────────────────────────────────────────
  # 2. Analyse statique avec Semgrep
  # ─────────────────────────────────────────
  semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep (OWASP Top 10)
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/jwt" \
            --json \
            --output semgrep-results.json \
            . || true

      - name: Run Semgrep (SQLi)
        run: |
          semgrep scan \
            --config "p/sql-injection" \
            --json \
            --output semgrep-sqli.json \
            . || true

      - name: Display findings summary
        run: |
          echo "=== Semgrep Findings ==="
          cat semgrep-results.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('results', [])
          print(f'Total findings: {len(results)}')
          for r in results[:10]:
              print(f'  [{r[\"extra\"][\"severity\"]}] {r[\"check_id\"]} — {r[\"path\"]}:{r[\"start\"][\"line\"]}')
          " || true

      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: |
            semgrep-results.json
            semgrep-sqli.json

  # ─────────────────────────────────────────
  # 3. Détection de secrets (Gitleaks)
  # ─────────────────────────────────────────
  secret-scan:
    name: Secret Detection — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true  # ⚠️  .env commité → détection attendue

  # ─────────────────────────────────────────
  # 4. Analyse des headers HTTP (pour version corrigée)
  # ─────────────────────────────────────────
  security-headers:
    name: Security Headers Check
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          JWT_SECRET: ci-test-secret-not-real
          DATABASE_PATH: ./data/ci-test.db

      - name: Start server and check headers
        run: |
          npm start &
          sleep 5
          echo "=== Checking security headers ==="
          curl -s -I http://localhost:3000 | grep -E "(X-Frame-Options|Content-Security-Policy|X-Content-Type-Options|Strict-Transport-Security|Referrer-Policy)" || echo "MISSING security headers detected"
        env:
          JWT_SECRET: ci-test-secret-not-real
          DATABASE_PATH: ./data/ci-test.db
        continue-on-error: true

  # ─────────────────────────────────────────
  # 5. Rapport de sécurité consolidé
  # ─────────────────────────────────────────
  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [dependency-audit, semgrep, secret-scan]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate consolidated report
        run: |
          echo "# Security Report — TicketApp Vulnérable" > security-report.md
          echo "Date: $(date -u)" >> security-report.md
          echo "" >> security-report.md
          echo "## Résultats" >> security-report.md
          echo "| Job | Statut |" >> security-report.md
          echo "|-----|--------|" >> security-report.md
          echo "| npm audit | ${{ needs.dependency-audit.result }} |" >> security-report.md
          echo "| Semgrep SAST | ${{ needs.semgrep.result }} |" >> security-report.md
          echo "| Gitleaks | ${{ needs.secret-scan.result }} |" >> security-report.md
          cat security-report.md

      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
