name: Security CI

on:
  push:
    branches:
      - main
      - secure-version
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: SCA - npm audit
        run: npm audit --audit-level=high
        continue-on-error: true  # ⚠️  attendu : la version vulnérable a des CVE connus

      # ── 3. SAST — Semgrep ─────────────────────────────────────────────────
      # Static Application Security Testing : analyse le code source
      # Détecte : SQLi, XSS, SSRF, mauvaises configs JWT, stack traces exposées
      - name: SAST - Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/nodejs
            p/jwt
            p/sql-injection
        continue-on-error: true  # ⚠️  attendu : vulnérabilités intentionnelles détectées
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ── 4. Secret Scan — Gitleaks ─────────────────────────────────────────
      # Détecte les secrets commités : JWT_SECRET, clés API, mots de passe
      # ⚠️  attendu : .env commité avec JWT_SECRET=secret123
      - name: Secret Scan - Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true  # ⚠️  attendu : secrets détectés dans .env

      # ── 5. Build pour le DAST ─────────────────────────────────────────────
      - name: Build application
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-jwt-secret-32chars-minimum0' }}
          DATABASE_PATH: ./data/ci-test.db

      # ── 6. Initialiser la DB de test ──────────────────────────────────────
      - name: Init test database
        run: node scripts/init-db.js
        env:
          DATABASE_PATH: ./data/ci-test.db

      # ── 7. Démarrer l'application ─────────────────────────────────────────
      - name: Start app
        run: npm start &
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-jwt-secret-32chars-minimum0' }}
          DATABASE_PATH: ./data/ci-test.db

      # ── 8. Attendre que l'app soit prête ──────────────────────────────────
      - name: Wait for app
        run: npx wait-on http://localhost:3000 --timeout 30000

      # ── 9. Tests applicatifs de sécurité ──────────────────────────────────
      # Vérifient que chaque vulnérabilité est bien corrigée (ou bien présente sur main)
      # - main          : continue-on-error=true  → informatif, ne bloque pas
      # - secure-version: continue-on-error=false → bloquant si un test échoue
      - name: Security Tests
        run: node tests/security.test.mjs
        env:
          TEST_BASE_URL: http://localhost:3000
        continue-on-error: ${{ github.ref_name == 'main' }}

      # ── 10. DAST — OWASP ZAP Baseline ─────────────────────────────────────
      # Dynamic Application Security Testing : attaque l'app en boîte noire
      # Détecte : XSS reflété, headers manquants, infos sensibles exposées
      - name: DAST - OWASP ZAP
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false  # ⚠️  ne pas bloquer le pipeline sur la version vulnérable
        continue-on-error: true

      # ── 10. Upload des rapports ────────────────────────────────────────────
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
        continue-on-error: true
