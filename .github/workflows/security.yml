name: Security CI

on:
  push:
    branches:
      - main
      - secure-version
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 1. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 2. SCA — npm audit ────────────────────────────────────────────────
      # Niveau : critical uniquement.
      # Les CVE "high" restants (Next.js 14.2.x) nécessitent Next.js 16 (breaking change).
      # Ils sont documentés comme risques acceptés dans .audit-exceptions.md
      # et atténués par notre configuration (pas de remotePatterns, pas de rewrites, pas de i18n).
      - name: SCA - npm audit (critical)
        run: npm audit --audit-level=critical

      # Rapport high séparé — informatif seulement, ne bloque pas le pipeline
      - name: SCA - npm audit (high — informatif)
        run: npm audit --audit-level=high || true

      # ── 3. SAST — Semgrep ─────────────────────────────────────────────────
      - name: SAST - Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/javascript
            p/nodejs
            p/jwt
            p/sql-injection
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      # ── 4. Secret Scan — Gitleaks ─────────────────────────────────────────
      - name: Secret Scan - Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # ── 5. Build ──────────────────────────────────────────────────────────
      - name: Build application
        run: npm run build
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_PATH: ./data/ci-test.db

      # ── 6. Init DB ────────────────────────────────────────────────────────
      - name: Init test database
        run: node scripts/init-db.js
        env:
          DATABASE_PATH: ./data/ci-test.db

      # ── 7. Start app ──────────────────────────────────────────────────────
      - name: Start app
        run: npm start &
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DATABASE_PATH: ./data/ci-test.db

      # ── 8. Wait for app ───────────────────────────────────────────────────
      - name: Wait for app
        run: npx wait-on http://localhost:3000 --timeout 30000

      # ── 9. DAST — OWASP ZAP ──────────────────────────────────────────────
      # Corrige l'erreur de permission sur rules.tsv dans le container Docker
      - name: Fix ZAP rules file permissions
        run: chmod 644 .zap/rules.tsv

      - name: DAST - OWASP ZAP
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: true

      # ── 10. Upload rapports ───────────────────────────────────────────────
      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
